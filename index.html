<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoGuessr France</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      overflow:hidden;
      background:black;
    }

    #street-view{
      width:100vw;
      height:100vh;
    }

    /* Mini map */
    #map-container{
      position:absolute;
      bottom:20px;
      right:20px;
      width:320px;
      height:220px;
      border-radius:16px;
      overflow:hidden;
      z-index:1000;
      transition:all 0.3s ease;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    /* Grande map */
    #map-container.expanded{
      width:700px;
      height:500px;
    }

    #map{
      width:100%;
      height:100%;
    }

    .controls{
      position:absolute;
      top:10px;
      left:10px;
      z-index:2000;
      display:flex;
      gap:10px;
    }

    button{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      background:#111;
      color:white;
    }

    button:hover{
      background:#222;
    }

    #distance-box{
      position:absolute;
      top:20px;
      left:20px;
      z-index:2000;
      background:rgba(0,0,0,0.7);
      color:white;
      padding:12px 18px;
      border-radius:12px;
      font-size:18px;
      display:none;
    }

  </style>
</head>
<body>

<div id="street-view"></div>

<div id="distance-box"></div>

<div id="map-container">

  <div class="controls">
    <button onclick="toggleMap()">🗺️</button>
    <button onclick="validateGuess()">Valider</button>
  </div>

  <div id="map"></div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-Ip7Tdn0LQn2XXeIh1K5ksvuIMuwjV50&libraries=geometry"></script>

<script>

let map;
let playerMarker;
let realMarker;
let line;

let panorama;

let selectedLatLng = null;
let realPosition = null;

const mapContainer =
  document.getElementById("map-container");

const distanceBox =
  document.getElementById("distance-box");

const franceLocations = [

  { lat: 48.8566, lng: 2.3522 },
  { lat: 43.2965, lng: 5.3698 },
  { lat: 45.7640, lng: 4.8357 },
  { lat: 50.6292, lng: 3.0573 },
  { lat: 48.5734, lng: 7.7521 },
  { lat: 43.6047, lng: 1.4442 },
  { lat: 44.8378, lng: -0.5792 },
  { lat: 47.2184, lng: -1.5536 },
  { lat: 43.7102, lng: 7.2620 },
  { lat: 49.2583, lng: 4.0317 }

];

function randomLocation(){

  return franceLocations[
    Math.floor(
      Math.random() * franceLocations.length
    )
  ];

}

function toggleMap(){

  mapContainer.classList.toggle("expanded");

  setTimeout(() => {
    map.invalidateSize();
  }, 300);

}

function initGame(){

  map = L.map('map').setView(
    [46.603354, 1.888334],
    5
  );

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:
      '&copy; OpenStreetMap contributors'
    }
  ).addTo(map);

  map.on('click', function(e){

    selectedLatLng = e.latlng;

    if(playerMarker){
      map.removeLayer(playerMarker);
    }

    playerMarker = L.marker(
      e.latlng
    ).addTo(map);

  });

  startRound();

}

function startRound(){

  distanceBox.style.display = "none";

  const location = randomLocation();

  realPosition = new google.maps.LatLng(
    location.lat,
    location.lng
  );

  panorama =
    new google.maps.StreetViewPanorama(
      document.getElementById("street-view"),
      {
        position: realPosition,
        pov:{
          heading:34,
          pitch:10
        },
        zoom:1,
        addressControl:false,
        fullscreenControl:false
      }
    );

}

function validateGuess(){

  if(!selectedLatLng){

    alert("Clique sur la map");

    return;
  }

  const guess =
    new google.maps.LatLng(
      selectedLatLng.lat,
      selectedLatLng.lng
    );

  const distance =
    google.maps.geometry
    .spherical
    .computeDistanceBetween(
      realPosition,
      guess
    );

  const distanceKm =
    (distance / 1000).toFixed(2);

  // Vraie position
  realMarker = L.marker([
    realPosition.lat(),
    realPosition.lng()
  ]).addTo(map);

  // Ligne
  line = L.polyline([
    [
      selectedLatLng.lat,
      selectedLatLng.lng
    ],
    [
      realPosition.lat(),
      realPosition.lng()
    ]
  ]).addTo(map);

  // Zoom auto
  map.fitBounds(
    line.getBounds(),
    {
      padding:[50,50]
    }
  );

  // Distance
  distanceBox.innerHTML =
    "📍 Distance : " +
    distanceKm +
    " km";

  distanceBox.style.display =
    "block";

  // Nouveau round
  setTimeout(() => {

    if(playerMarker)
      map.removeLayer(playerMarker);

    if(realMarker)
      map.removeLayer(realMarker);

    if(line)
      map.removeLayer(line);

    selectedLatLng = null;

    map.setView(
      [46.603354,1.888334],
      5
    );

    startRound();

  }, 5000);

}

window.onload = initGame;

</script>

</body>
</html>
