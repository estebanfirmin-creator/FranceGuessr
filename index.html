<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>FranceGuessr Multiplayer</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
}

#street-view{
  width:100vw;
  height:100vh;
}

#map-container{

  position:absolute;

  bottom:20px;
  right:20px;

  width:320px;
  height:220px;

  border-radius:15px;

  overflow:hidden;

  z-index:1000;

  transition:0.3s;

}

#map-container.expanded{

  width:650px;
  height:450px;

}

#map-container.fullscreen{

  width:100vw;
  height:100vh;

  top:0;
  left:0;

  border-radius:0;

}

#map{
  width:100%;
  height:100%;
}

.controls{

  position:absolute;

  top:10px;
  left:10px;

  z-index:3000;

  display:flex;
  gap:10px;

}

button{

  border:none;

  padding:10px 15px;

  border-radius:10px;

  background:#111;

  color:white;

  font-weight:bold;

  cursor:pointer;

}

#result-box{

  position:absolute;

  bottom:30px;
  left:50%;

  transform:translateX(-50%);

  background:rgba(30,30,30,0.95);

  padding:25px;

  border-radius:20px;

  color:white;

  display:none;

  z-index:6000;

  width:700px;
  max-width:90%;

  text-align:center;

}

#distance-text{

  font-size:35px;
  font-weight:bold;

  margin-bottom:20px;

}

#continue-btn{

  width:100%;

  padding:18px;

  font-size:22px;

  background:#2ecc71;

}

#multiplayer-menu{

  position:absolute;

  top:20px;
  left:20px;

  z-index:5000;

  display:flex;
  gap:10px;

}

input{

  padding:10px;

  border-radius:10px;

  border:none;

}

</style>
</head>
<body>

<div id="street-view"></div>

<div id="multiplayer-menu">

<input
id="room-code"
placeholder="Code"
>

<button onclick="createRoom()">
Créer
</button>

<button onclick="joinRoom()">
Rejoindre
</button>

</div>

<div id="map-container">

<div class="controls">

<button onclick="toggleMap()">
🗺️
</button>

<button onclick="validateGuess()">
Valider
</button>

</div>

<div id="map"></div>

</div>

<div id="result-box">

<div id="distance-text">
Bravo : 0 km
</div>

<button
id="continue-btn"
onclick="nextRound()"
>
Continuer
</button>

</div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB-Ip7Tdn0LQn2XXeIh1K5ksvuIMuwjV50&libraries=geometry">
</script>

<script type="module">

// =====================
// FIREBASE ICI
// =====================

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  update,
  onValue
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyDjup1pMAENznn129njn4qnqoTasaN9-n8",

  authDomain: "franceguessr-d1706.firebaseapp.com",

  databaseURL: "https://franceguessr-d1706-default-rtdb.europe-west1.firebasedatabase.app",

  projectId: "franceguessr-d1706",

  storageBucket: "franceguessr-d1706.firebasestorage.app",

  messagingSenderId: "232820209634",

  appId: "1:232820209634:web:8326a8f01fcbadc18a6bbb"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

// =====================

let currentRoom = null;

let map;
let panorama;

let selectedLatLng = null;
let realPosition = null;

let playerMarker;
let realMarker;
let line;

const streetViewService =
new google.maps.StreetViewService();

function generateRoomCode(){

  return Math.random()
  .toString(36)
  .substring(2,8)
  .toUpperCase();

}

window.createRoom = async function(){

  const code =
  generateRoomCode();

  currentRoom = code;

  const location =
  await randomLocation();

  await set(
    ref(db, "rooms/" + code),
    {
      location:location,
      started:true
    }
  );

  alert("Code : " + code);

  loadLocation(location);

}

window.joinRoom = function(){

  const code =
  document.getElementById(
    "room-code"
  ).value;

  currentRoom = code;

  onValue(
    ref(db, "rooms/" + code),
    (snapshot) => {

      const data = snapshot.val();

      if(data && data.location){

        loadLocation(
          data.location
        );

      }

    }
  );

}

async function randomLocation(){

  return new Promise((resolve)=>{

    function tryLocation(){

      const lat =
      Math.random()*(50.5-42.3)+42.3;

      const lng =
      Math.random()*(7.8-(-4.9))+(-4.9);

      streetViewService.getPanorama({

        location:{lat,lng},

        radius:5000,

        source:
        google.maps.StreetViewSource.OUTDOOR

      }, (data,status)=>{

        if(status==='OK'){

          resolve({
            lat:data.location.latLng.lat(),
            lng:data.location.latLng.lng()
          });

        }else{
          tryLocation();
        }

      });

    }

    tryLocation();

  });

}

function loadLocation(location){

  realPosition =
  new google.maps.LatLng(
    location.lat,
    location.lng
  );

  panorama =
  new google.maps.StreetViewPanorama(
    document.getElementById(
      'street-view'
    ),
    {
      position:realPosition,
      pov:{
        heading:34,
        pitch:10
      },
      zoom:1,
      addressControl:false,
      fullscreenControl:false
    }
  );

}

window.toggleMap = function(){

  document
  .getElementById("map-container")
  .classList
  .toggle("expanded");

  setTimeout(()=>{
    map.invalidateSize();
  },300);

}

window.validateGuess = function(){

  if(!selectedLatLng)return;

  const guess =
  new google.maps.LatLng(
    selectedLatLng.lat,
    selectedLatLng.lng
  );

  const distance =
  google.maps.geometry
  .spherical
  .computeDistanceBetween(
    realPosition,
    guess
  );

  const distanceKm =
  (distance/1000).toFixed(2);

  document
  .getElementById("map-container")
  .classList
  .add("fullscreen");

  realMarker = L.circleMarker([
    realPosition.lat(),
    realPosition.lng()
  ],{
    color:"green",
    fillColor:"green",
    fillOpacity:1,
    radius:10
  }).addTo(map);

  line = L.polyline([
    [
      selectedLatLng.lat,
      selectedLatLng.lng
    ],
    [
      realPosition.lat(),
      realPosition.lng()
    ]
  ]).addTo(map);

  map.fitBounds(
    line.getBounds(),
    {
      padding:[100,100]
    }
  );

  document
  .getElementById("distance-text")
  .innerHTML =
  "Bravo : " +
  distanceKm +
  " km";

  document
  .getElementById("result-box")
  .style.display = "block";

}

window.nextRound = function(){

  location.reload();

}

map = L.map('map').setView(
[46.603354,1.888334],
6
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
  attribution:'© OpenStreetMap'
}
).addTo(map);

map.on('click', function(e){

  selectedLatLng = e.latlng;

  if(playerMarker){
    map.removeLayer(playerMarker);
  }

  playerMarker =
  L.marker(e.latlng).addTo(map);

});

</script>
</body>
</html>
