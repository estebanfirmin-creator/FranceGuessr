<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Labyrinthe - Prototype 3D</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    canvas {
      display: block;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 22px;
      pointer-events: none;
    }

    #inventory {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .slot {
      width: 70px;
      height: 70px;
      background: rgba(30, 30, 30, 0.9);
      border: 2px solid #999;
      border-radius: 10px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      padding: 5px;
    }

    #mobileControls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    #joystickBase {
      position: absolute;
      bottom: 120px;
      left: 30px;
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.12);
      border: 3px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      pointer-events: auto;
      touch-action: none;
    }

    #joystickStick {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      left: 35px;
      top: 35px;
    }

    #runButton {
      position: absolute;
      right: 30px;
      bottom: 120px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: none;
      background: rgba(255,120,120,0.85);
      color: white;
      font-weight: bold;
      font-size: 18px;
      pointer-events: auto;
    }

    #useButton {
      position: absolute;
      right: 50px;
      bottom: 250px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: none;
      background: rgba(120,170,255,0.85);
      color: white;
      font-weight: bold;
      font-size: 15px;
      pointer-events: auto;
    }

    #message {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 10px;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="crosshair">+</div>

<div id="message">
  Jeu mobile • Utilise les contrôles tactiles
</div>

<div id="mobileControls">
  <div id="joystickBase">
    <div id="joystickStick"></div>
  </div>

  <button id="runButton">COURIR</button>
  <button id="useButton">UTILISER</button>
</div>

<div id="inventory">
  <div class="slot">⚔️<br>Épée</div>
  <div class="slot">💧<br>Gourde</div>
  <div class="slot">Vide</div>
  <div class="slot">Vide</div>
  <div class="slot">Vide</div>
  <div class="slot">Vide</div>
  <div class="slot">Vide</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js';
import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/controls/PointerLockControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 350);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// =====================
// LUMIÈRES
// =====================

const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(100, 200, 100);
sun.castShadow = true;
scene.add(sun);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

// =====================
// SOL
// =====================

const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3f8f3f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// =====================
// CONTRÔLES FPS
// =====================

const controls = new PointerLockControls(camera, document.body);

camera.position.set(0, 4, 20);

scene.add(controls.getObject());

document.getElementById('message').style.display = 'none';

// =====================
// MOUVEMENT
// =====================

// Contrôles uniquement mobile

// =====================
// MURS GÉANTS
// =====================

function createWall(x, z, width, depth) {
  const geo = new THREE.BoxGeometry(width, 40, depth);
  const mat = new THREE.MeshStandardMaterial({ color: 0x777777 });
  const wall = new THREE.Mesh(geo, mat);
  wall.position.set(x, 20, z);
  wall.castShadow = true;
  wall.receiveShadow = true;
  scene.add(wall);

  // Lierre
  for (let i = 0; i < 20; i++) {
    const ivyGeo = new THREE.SphereGeometry(1.5, 8, 8);
    const ivyMat = new THREE.MeshStandardMaterial({ color: 0x1f7a1f });
    const ivy = new THREE.Mesh(ivyGeo, ivyMat);

    ivy.position.set(
      x + (Math.random() - 0.5) * width,
      Math.random() * 35,
      z + (Math.random() - 0.5) * depth
    );

    scene.add(ivy);
  }
}

createWall(0, -120, 250, 5);
createWall(0, 120, 250, 5);
createWall(-120, 0, 5, 250);
createWall(120, 0, 5, 250);

// =====================
// PORTE DU LABYRINTHE
// =====================

const gateGeo = new THREE.BoxGeometry(20, 25, 3);
const gateMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const gate = new THREE.Mesh(gateGeo, gateMat);
gate.position.set(0, 12, -118);
scene.add(gate);

// =====================
// MAISON EN BOIS
// =====================

function createHouse() {
  const house = new THREE.Group();

  const bodyGeo = new THREE.BoxGeometry(30, 15, 20);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 7.5;
  body.castShadow = true;
  house.add(body);

  const roofGeo = new THREE.ConeGeometry(22, 10, 4);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x5a2d0c });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.rotation.y = Math.PI / 4;
  roof.position.y = 20;
  roof.castShadow = true;
  house.add(roof);

  // Lits superposés
  for (let i = 0; i < 4; i++) {
    const bedGeo = new THREE.BoxGeometry(4, 1, 8);
    const bedMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

    const bottomBed = new THREE.Mesh(bedGeo, bedMat);
    bottomBed.position.set(-8 + i * 5, 2, -3);
    house.add(bottomBed);

    const topBed = new THREE.Mesh(bedGeo, bedMat);
    topBed.position.set(-8 + i * 5, 5, -3);
    house.add(topBed);
  }

  // Bureau
  const deskGeo = new THREE.BoxGeometry(5, 3, 3);
  const deskMat = new THREE.MeshStandardMaterial({ color: 0x4a2a0a });
  const desk = new THREE.Mesh(deskGeo, deskMat);
  desk.position.set(0, 2, 5);
  house.add(desk);

  house.position.set(-40, 0, 0);
  scene.add(house);
}

createHouse();

// =====================
// CHAMPS DE BLÉ
// =====================

function createWheat(x, z) {
  const stemGeo = new THREE.CylinderGeometry(0.1, 0.1, 2);
  const stemMat = new THREE.MeshStandardMaterial({ color: 0xd4b24c });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.set(x, 1, z);
  scene.add(stem);
}

for (let x = 20; x < 50; x += 2) {
  for (let z = 20; z < 50; z += 2) {
    createWheat(x, z);
  }
}

// =====================
// ARBRES AVEC FRUITS
// =====================

function createTree(x, z) {
  const trunkGeo = new THREE.CylinderGeometry(1, 1.2, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3b1e });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.set(x, 4, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const leavesGeo = new THREE.SphereGeometry(4, 16, 16);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.set(x, 10, z);
  leaves.castShadow = true;
  scene.add(leaves);

  // Fruits
  for (let i = 0; i < 8; i++) {
    const fruitGeo = new THREE.SphereGeometry(0.3, 8, 8);
    const fruitMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const fruit = new THREE.Mesh(fruitGeo, fruitMat);

    fruit.position.set(
      x + (Math.random() - 0.5) * 5,
      9 + Math.random() * 2,
      z + (Math.random() - 0.5) * 5
    );

    scene.add(fruit);
  }
}

for (let i = 0; i < 60; i++) {
  const x = (Math.random() - 0.5) * 180;
  const z = (Math.random() - 0.5) * 180;

  if (Math.abs(x) > 20 || Math.abs(z) > 20) {
    createTree(x, z);
  }
}

// =====================
// FOUR EN PIERRE
// =====================

function createOven() {
  const geo = new THREE.CylinderGeometry(4, 5, 5, 16);
  const mat = new THREE.MeshStandardMaterial({ color: 0x666666 });
  const oven = new THREE.Mesh(geo, mat);
  oven.position.set(25, 2.5, -20);
  oven.castShadow = true;
  scene.add(oven);
}

createOven();

// =====================
// PUITS
// =====================

function createWell() {
  const geo = new THREE.CylinderGeometry(4, 4, 4, 16);
  const mat = new THREE.MeshStandardMaterial({ color: 0x777777 });
  const well = new THREE.Mesh(geo, mat);
  well.position.set(-20, 2, 20);
  well.castShadow = true;
  scene.add(well);

  const waterGeo = new THREE.CylinderGeometry(3.2, 3.2, 1, 16);
  const waterMat = new THREE.MeshStandardMaterial({
    color: 0x3399ff,
    transparent: true,
    opacity: 0.8
  });

  const water = new THREE.Mesh(waterGeo, waterMat);
  water.position.set(-20, 1.5, 20);
  scene.add(water);
}

createWell();

// =====================
// ANIMATION
// =====================

const joystickBase = document.getElementById('joystickBase');
const joystickStick = document.getElementById('joystickStick');
const runButton = document.getElementById('runButton');
const useButton = document.getElementById('useButton');

let moveX = 0;
let moveY = 0;
let running = false;

const speed = 0.12;

// JOYSTICK MOBILE
joystickBase.addEventListener('touchmove', (e) => {
  e.preventDefault();

  const touch = e.touches[0];
  const rect = joystickBase.getBoundingClientRect();

  const x = touch.clientX - rect.left - 70;
  const y = touch.clientY - rect.top - 70;

  const distance = Math.min(40, Math.sqrt(x * x + y * y));
  const angle = Math.atan2(y, x);

  const stickX = Math.cos(angle) * distance;
  const stickY = Math.sin(angle) * distance;

  joystickStick.style.left = `${35 + stickX}px`;
  joystickStick.style.top = `${35 + stickY}px`;

  moveX = stickX / 40;
  moveY = stickY / 40;
});

joystickBase.addEventListener('touchend', () => {
  joystickStick.style.left = '35px';
  joystickStick.style.top = '35px';

  moveX = 0;
  moveY = 0;
});

runButton.addEventListener('touchstart', () => {
  running = true;
});

runButton.addEventListener('touchend', () => {
  running = false;
});

useButton.addEventListener('touchstart', () => {
  alert('Action utilisée !');
});

function animate() {
  requestAnimationFrame(animate);

  const currentSpeed = running ? speed * 2 : speed;

  // Contrôles mobile
  controls.moveForward(-moveY * currentSpeed);
  controls.moveRight(moveX * currentSpeed);

  renderer.render(scene, camera);
}

animate();

// =====================
// RESIZE
// =====================

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
